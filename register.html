<h2>Register</h2>

<input id="user">
<input id="pass">

<button onclick="register()">Register</button>

<script>

async function register(){

await fetch("/api/register",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

user:user.value,
pass:pass.value

})

})

location="login.html"

}

</script>
